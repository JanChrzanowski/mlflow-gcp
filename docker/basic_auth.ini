###############################################################################
# MLflow basic-auth configuration template
#
# This file is shipped in the Docker image as documentation/fallback.
# The actual runtime config is generated by entrypoint.sh at container start
# and written to /tmp/basic_auth.ini with real credentials injected from
# Secret Manager environment variables.
#
# Reference: https://mlflow.org/docs/latest/auth/index.html
###############################################################################

[mlflow]
# Default permission for users not explicitly listed.
# NO_PERMISSIONS forces every user to authenticate.
default_permission = NO_PERMISSIONS

# Auth metadata database — same PostgreSQL as the tracking store.
# Populated at runtime by entrypoint.sh.
database_uri = POPULATED_AT_RUNTIME

# Bootstrap admin account (created on first startup).
# Credentials come from Secret Manager via environment variables.
admin_username = POPULATED_AT_RUNTIME
admin_password = POPULATED_AT_RUNTIME
